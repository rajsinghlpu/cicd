apiVersion: apps/v1
kind: Deployment

metadata:
  name: website

spec:
  replicas: 3

  selector:
    matchLabels:
      app: website

  template:

    metadata:
      labels:
        app: website

    spec:

      containers:
      - name: website

        image: rajsingh9479/mywebsite:v1

        ports:
        - containerPort: 80

        imagePullPolicy: Always
