apiVersion: apps/v1
kind: Deployment

metadata:
  name: web

spec:
  replicas: 2

  selector:
    matchLabels:
      app: web

  template:

    metadata:
      labels:
        app: web

    spec:

      containers:

      - name: nginx

        image: cicd-web:v1

        ports:

        - containerPort: 80
