name: CI-CD

on:
 push:
  branches:
   - main


jobs:

 build:

  runs-on: ubuntu-latest


  steps:

  - name: Checkout
    uses: actions/checkout@v4


  - name: Build Docker

    run: |
      docker build \
      -t ${{ secrets.DOCKER_USERNAME }}/cicd-web:${{ github.sha }} .


  - name: Login Docker Hub

    uses: docker/login-action@v3

    with:

      username: ${{ secrets.DOCKER_USERNAME }}

      password: ${{ secrets.DOCKER_PASSWORD }}


  - name: Push Image

    run: |

      docker push \
      ${{ secrets.DOCKER_USERNAME }}/cicd-web:${{ github.sha }}
